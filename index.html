<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Älypää-Visa v2.3.2</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#007bff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="quiz-container">

  <!-- ===== START SCREEN ===== -->
  <div id="start-screen">
    <h1>🧠 Älypää-Visa</h1>
    
    <div style="margin-bottom: 24px;">
      <label for="category-select" class="subtitle" style="display:block; margin-bottom: 8px;">Valitse aihe:</label>
      <select id="category-select" class="btn" style="width:100%; text-align:center; padding:12px; margin-bottom:16px;">
        <option value="Kaikki">🌍 Kaikki aiheet (Sekoitus)</option>
        <option value="Maantieto">🗺️ Maantieto</option>
        <option value="Tiede">🔬 Tiede & Luonto</option>
        <option value="Historia">📜 Historia</option>
        <option value="Viihde">🎬 Viihde & Kulttuuri</option>
        <option value="Urheilu">⚽ Urheilu</option>
      </select>
    </div>

    <p class="subtitle">Valitse pelin pituus:</p>
    <div class="options-container">
      <button class="btn" onclick="startQuiz(10)">Pelaa 10 kysymystä</button>
      <button class="btn" onclick="startQuiz(20)">Pelaa 20 kysymystä</button>
      <button class="btn" onclick="startQuiz(50)">Pelaa 50 kysymystä</button>
    </div>
    <div id="install-banner">📲 Asenna sovellus puhelimeen</div>
  </div>

  <!-- ===== QUIZ BOX ===== -->
  <div id="quiz-box" style="display:none;">
    <div class="score-board">Pisteet: <span id="score">0</span></div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
    <div class="question-text" id="question">Ladataan...</div>
    <div class="options-container" id="options"></div>
    <div class="explanation" id="explanation"></div>
    <p class="high-score" id="high-score" style="display:none;"></p>
    <button id="next-btn" onclick="nextQuestion()">Seuraava kysymys ➜</button>
    <button id="share-btn" class="action-btn" style="display:none;">📤 Jaa tuloksesi kavereille</button>
  </div>

  <div style="margin-top:20px; color:#6b7280; font-size:0.8rem;">Versio 2.3.2 (Clear Colors & Big Button)</div>

</div>

<!-- Scripts: questions first, then game logic -->
<script src="questions.js"></script>
<script src="app.js"></script>

</body>
</html>
