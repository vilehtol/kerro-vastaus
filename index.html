<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Älypää-Visa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#06080f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="quiz-container">

  <div id="start-screen">
    <h1>🧠 Älypää-Visa</h1>
    <p class="subtitle">Valitse kategoria ja kysymysmäärä:</p>

    <div class="category-picker">
      <select id="category-select">
        <option value="Kaikki">🌐 Kaikki kategoriat</option>
        <option value="Maantieto">🗺️ Maantieto</option>
        <option value="Tiede">🔬 Tiede</option>
        <option value="Urheilu">⚽ Urheilu</option>
        <option value="Luonto">🌿 Luonto</option>
        <option value="Historia">📜 Historia</option>
        <option value="Viihde">🎬 Viihde</option>
        <option value="Kirjallisuus">📚 Kirjallisuus</option>
        <option value="Teknologia">💻 Teknologia</option>
        <option value="Taide">🎨 Taide</option>
        <option value="Musiikki">🎵 Musiikki</option>
        <option value="Ruoka &amp; Juoma">🍽️ Ruoka &amp; Juoma</option>
        <option value="Kulttuuri">🏛️ Kulttuuri</option>
      </select>
    </div>

    <div class="options-container">
      <button class="btn" onclick="startQuiz(10)">⚡ 10 kysymystä</button>
      <button class="btn" onclick="startQuiz(20)">🔥 20 kysymystä</button>
      <button class="btn" onclick="startQuiz(50)">🏆 50 kysymystä</button>
    </div>
    <p class="question-count" id="question-count"></p>
    <div id="install-banner">📲 Asenna sovellus puhelimeen</div>
  </div>

  <div id="quiz-box" style="display:none;">
    <div class="score-board">Pisteet: <span id="score">0</span></div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
    <div class="question-text" id="question">Ladataan...</div>
    <div class="options-container" id="options"></div>
    <div class="explanation" id="explanation"></div>
    <p class="high-score" id="high-score" style="display:none;"></p>
    <button id="next-btn" onclick="nextQuestion()">Seuraava kysymys ➜</button>
    <button id="share-btn" class="action-btn" style="display:none;">📤 Jaa tuloksesi kavereille</button>
  </div>

</div>
<script src="questions.js"></script>
<script src="app.js"></script>
</body>
</html>
